kind = "web"
previewPath = "/"
title = "ClaimTrace"
version = "1.0.0"
id = "artifacts/claimtrace"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
localPort = 19559
name = "web"
paths = ["/"]

[services.development]
run = "pnpm --filter @workspace/claimtrace run dev"

[services.env]
PORT = "19559"
BASE_PATH = "/"

[services.production]
build = ["pnpm", "--filter", "@workspace/claimtrace", "run", "build"]
publicDir = "artifacts/claimtrace/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"
